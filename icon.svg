<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">TeknoParrot Tools</title>
  <desc id="desc">A neon arcade parrot badge for the HyperHQ TeknoParrot plugin.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="256" y2="256" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1220"/>
      <stop offset="1" stop-color="#06111F"/>
    </linearGradient>
    <linearGradient id="body" x1="60" y1="40" x2="200" y2="220" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22D3EE"/>
      <stop offset="0.55" stop-color="#2563EB"/>
      <stop offset="1" stop-color="#14B8A6"/>
    </linearGradient>
    <linearGradient id="wing" x1="70" y1="90" x2="150" y2="190" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2DD4BF"/>
      <stop offset="1" stop-color="#0F766E"/>
    </linearGradient>
  </defs>

  <rect width="256" height="256" rx="48" fill="url(#bg)"/>

  <!-- Parrot head + body, facing right -->
  <path d="M96 60
           C68 60 48 84 48 116
           C48 150 72 176 104 184
           L104 206
           C104 213 110 218 117 217
           L150 211
           C158 209 160 200 154 195
           L140 184
           C176 178 200 150 200 116
           C200 84 168 56 130 56
           C118 56 106 58 96 60 Z"
        fill="url(#body)"/>

  <!-- Wing -->
  <path d="M86 100
           C72 108 64 124 68 142
           C72 158 86 170 104 172
           C118 174 130 168 136 156
           C124 158 110 154 102 144
           C94 134 92 118 98 106
           C94 104 90 102 86 100 Z"
        fill="url(#wing)"/>

  <!-- Beak -->
  <path d="M196 104 C212 108 220 116 220 124 C220 132 212 138 196 140
           C202 130 202 114 196 104 Z" fill="#FACC15"/>

  <!-- Eye -->
  <circle cx="156" cy="98" r="8" fill="#0B1220"/>
  <circle cx="159" cy="95" r="2.5" fill="#E0F2FE"/>

  <!-- Crest feathers -->
  <path d="M104 56 C100 44 104 34 112 28" stroke="#F97316" stroke-width="8" stroke-linecap="round" fill="none"/>
  <path d="M120 52 C118 40 124 30 134 26" stroke="#FACC15" stroke-width="8" stroke-linecap="round" fill="none"/>
  <path d="M136 54 C136 42 142 32 152 30" stroke="#22C55E" stroke-width="8" stroke-linecap="round" fill="none"/>

  <!-- Joystick the parrot perches on -->
  <rect x="60" y="206" width="136" height="14" rx="7" fill="#111827"/>
  <circle cx="92" cy="213" r="9" fill="#F97316"/>
  <circle cx="128" cy="213" r="9" fill="#FACC15"/>
  <circle cx="164" cy="213" r="9" fill="#22C55E"/>
</svg>
